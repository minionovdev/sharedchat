<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Общий чат (P2P)</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/radix.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/store.js"></script>
  <link rel="stylesheet" href="style.css"> <!-- если захочешь вынести стили -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif; background:#1e1e2f; color:#e0e0e0;
      min-height:100vh; display:flex; justify-content:center; align-items:center;
    }
    .app {
      width:100%; max-width:850px; height:95vh; background:#2a2a3c;
      border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.3);
      display:flex; flex-direction:column; overflow:hidden;
    }
    .modal {
      position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7);
      display:flex; align-items:center; justify-content:center; z-index:1000;
    }
    .modal-content {
      background:#2a2a3c; padding:2rem; border-radius:12px;
      width:90%; max-width:400px;
    }
    .modal-content h2 { margin-bottom:1rem; color:#fff; }
    .modal-content input {
      width:100%; padding:10px; margin-bottom:1rem;
      border:none; border-radius:8px; background:#3a3a4e; color:#fff; font-size:1rem;
    }
    .modal-content button {
      width:100%; padding:12px; background:#5b5bf0;
      border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;
    }
    .modal-content .error { color:#ff6b6b; margin-bottom:0.5rem; }
    .header {
      background:#1e1e2f; padding:10px 20px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #3a3a4e;
    }
    .user-badge { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .user-badge img {
      width:32px; height:32px; border-radius:50%; object-fit:cover;
      background:#3a3a4e;
    }
    .nickname { font-weight:bold; color:#5b5bf0; }
    .header-actions { display:flex; gap:8px; }
    .header-actions button {
      background:#3a3a4e; border:none; padding:6px 12px;
      border-radius:6px; color:#e0e0e0; cursor:pointer;
    }
    .stats {
      display:flex; gap:16px; padding:6px 20px;
      background:#252538; border-bottom:1px solid #3a3a4e;
      font-size:0.85rem; color:#aaa;
    }
    .stat-value { font-weight:bold; color:#5b5bf0; }
    .tabs { display:flex; background:#1e1e2f; border-bottom:1px solid #3a3a4e; }
    .tab {
      flex:1; text-align:center; padding:12px; cursor:pointer;
      border-bottom:3px solid transparent; color:#a0a0b0;
    }
    .tab.active {
      color:#5b5bf0; border-bottom-color:#5b5bf0; background:#2a2a3c;
    }
    .chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .messages {
      flex:1; overflow-y:auto; padding:12px;
      display:flex; flex-direction:column; gap:6px;
    }
    .message {
      background:#3a3a4e; border-radius:12px; padding:8px 12px;
      max-width:80%; word-wrap:break-word; align-self:flex-start;
      position:relative;
    }
    .message.own { align-self:flex-end; background:#5b5bf0; color:white; }
    .msg-head {
      font-size:0.8rem; margin-bottom:4px; opacity:0.8;
      display:flex; align-items:center; gap:6px;
    }
    .msg-nick { font-weight:bold; cursor:pointer; }
    .msg-time { margin-left:8px; font-size:0.7rem; }
    .msg-text { font-size:0.95rem; line-height:1.4; }
    .reactions { display:flex; gap:4px; margin-top:4px; }
    .reaction {
      background:rgba(0,0,0,0.3); border-radius:10px;
      padding:2px 6px; font-size:0.8rem; cursor:pointer;
    }
    .input-row {
      display:flex; padding:10px; background:#1e1e2f;
      border-top:1px solid #3a3a4e; gap:8px;
    }
    .input-row input {
      flex:1; padding:10px; border:none; border-radius:8px;
      background:#3a3a4e; color:#fff; font-size:1rem;
    }
    .input-row button {
      padding:10px 16px; background:#5b5bf0;
      border:none; border-radius:8px; color:white;
      font-weight:bold; cursor:pointer;
    }
    .private-setup {
      display:flex; padding:10px; background:#1e1e2f;
      border-bottom:1px solid #3a3a4e; gap:8px; align-items:center;
    }
    .private-setup input { flex:1; padding:8px; border-radius:8px; background:#3a3a4e; color:#fff; }
    .private-setup button { padding:8px 16px; background:#5b5bf0; border:none; border-radius:8px; color:#fff; cursor:pointer; }
    .private-info {
      padding:8px 16px; background:#2a2a3c; font-size:0.9rem;
      border-bottom:1px solid #3a3a4e;
    }
    .hidden { display:none !important; }
    .messages::-webkit-scrollbar { width:5px; }
    .messages::-webkit-scrollbar-thumb { background:#5b5bf0; border-radius:3px; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Регистрация -->
  <div class="modal" id="reg-modal">
    <div class="modal-content">
      <h2>🚀 Вход в чат</h2>
      <p style="margin-bottom:1rem; color:#aaa;">Придумайте уникальный ник</p>
      <input type="text" id="reg-nick" placeholder="Ваш ник" maxlength="20">
      <div class="error" id="reg-error"></div>
      <button id="reg-btn">Войти</button>
    </div>
  </div>

  <!-- Профиль -->
  <div class="modal hidden" id="profile-modal">
    <div class="modal-content">
      <h2>Профиль</h2>
      <div style="text-align:center; margin-bottom:1rem;">
        <img id="profile-avatar" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#3a3a4e;">
      </div>
      <p style="color:#fff; text-align:center;" id="profile-nick"></p>
      <button id="close-profile" style="margin-top:1rem;">Закрыть</button>
    </div>
  </div>

  <!-- Редактирование профиля -->
  <div class="modal hidden" id="edit-profile-modal">
    <div class="modal-content">
      <h2>Редактировать профиль</h2>
      <label style="color:#aaa;">Аватар (URL картинки)</label>
      <input type="text" id="edit-avatar-url" placeholder="https://...">
      <label style="color:#aaa;">Новый ник</label>
      <input type="text" id="edit-nick" maxlength="20">
      <div class="error" id="edit-error"></div>
      <button id="save-profile">Сохранить</button>
      <button id="cancel-edit" style="margin-top:0.5rem; background:#3a3a4e;">Отмена</button>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div id="main-ui" class="hidden" style="display:flex; flex-direction:column; height:100%;">
    <div class="header">
      <div class="user-badge" id="self-badge">
        <img id="self-avatar" src="" alt="аватар">
        <span class="nickname" id="self-nick"></span>
      </div>
      <div class="header-actions">
        <button id="edit-profile-btn">✎ Профиль</button>
        <button id="logout-btn">Выйти</button>
      </div>
    </div>
    <!-- Статистика -->
    <div class="stats">
      <div>👥 Участников: <span class="stat-value" id="users-count">0</span></div>
      <div>💬 Сообщений: <span class="stat-value" id="messages-count">0</span></div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="public">💬 Общий чат</div>
      <div class="tab" data-tab="private">📩 Личные сообщения</div>
    </div>

    <!-- Общий чат -->
    <div class="chat-panel" id="public-panel">
      <div class="messages" id="public-messages"></div>
      <div class="input-row">
        <input type="text" id="public-input" placeholder="Ваше сообщение..." maxlength="500">
        <button id="public-send">Отправить</button>
      </div>
    </div>

    <!-- Личные сообщения -->
    <div class="chat-panel hidden" id="private-panel">
      <div class="private-setup">
        <input type="text" id="private-recipient" placeholder="Ник собеседника" maxlength="20">
        <button id="open-private-btn">Открыть чат</button>
      </div>
      <div class="private-info hidden" id="private-header"></div>
      <div class="messages" id="private-messages"></div>
      <div class="input-row hidden" id="private-input-row">
        <input type="text" id="private-input" placeholder="Личное сообщение..." maxlength="500">
        <button id="private-send">Отправить</button>
      </div>
    </div>
  </div>
</div>

<script src="chat.js"></script>
</body>
</html>
