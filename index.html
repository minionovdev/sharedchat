<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Общий чат</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #e94560;
            --accent2: #533483;
            --text: #e0e0e0;
            --text2: #a0a0b8;
            --border: #2a2a4a;
            --bubble-mine: #1b3a5c;
            --bubble-other: #1e2a3a;
            --success: #4ecca3;
            --warning: #f0a500;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Фоновые частицы */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(110vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        /* Основной контейнер */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            height: 92vh;
            max-height: 800px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            margin: 10px;
        }

        /* Шапка */
        .chat-header {
            background: var(--surface2);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .chat-header .title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-header .icon-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .chat-header .subtitle {
            font-size: 0.75rem;
            color: var(--text2);
            letter-spacing: 0.2px;
        }
        .stats-badge {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--success);
            white-space: nowrap;
            letter-spacing: 0.3px;
            transition: var(--transition);
        }
        .stats-badge .count {
            font-size: 1.1rem;
            font-weight: 800;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            background: var(--surface);
            overscroll-behavior: contain;
        }
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* Сообщения */
        .message-wrapper {
            display: flex;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message-wrapper.mine {
            justify-content: flex-end;
        }
        .message-wrapper.other {
            justify-content: flex-start;
        }
        .message-wrapper.system {
            justify-content: center;
        }
        .message-bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.92rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            letter-spacing: 0.15px;
        }
        .message-wrapper.mine .message-bubble {
            background: var(--bubble-mine);
            border-bottom-right-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .message-wrapper.other .message-bubble {
            background: var(--bubble-other);
            border-bottom-left-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .message-wrapper.system .message-bubble {
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text2);
            padding: 6px 16px;
            letter-spacing: 0.4px;
            font-style: italic;
        }
        .message-nickname {
            font-weight: 700;
            font-size: 0.78rem;
            margin-bottom: 2px;
            letter-spacing: 0.3px;
        }
        .message-time {
            font-size: 0.65rem;
            color: var(--text2);
            margin-top: 4px;
            text-align: right;
            letter-spacing: 0.4px;
            opacity: 0.8;
        }
        .message-text {
            letter-spacing: 0.2px;
        }

        /* Нижняя панель ввода */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface2);
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            letter-spacing: 0.2px;
        }
        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233, 68, 96, 0.15);
        }
        .input-area input::placeholder {
            color: #555;
            letter-spacing: 0.3px;
        }
        .btn-send {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(233, 68, 96, 0.35);
        }
        .btn-send:hover {
            background: #ff5a75;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 68, 96, 0.5);
        }
        .btn-send:active {
            transform: scale(0.93);
            transition: 0.08s ease;
        }
        .btn-send svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Модальное окно (никнейм) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-dialog {
            background: var(--surface);
            border-radius: 20px;
            padding: 30px 24px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border);
            animation: modalPop 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes modalPop {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-dialog h2 {
            margin-bottom: 6px;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
        }
        .modal-dialog .modal-subtitle {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }
        .modal-dialog input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 25px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            text-align: center;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }
        .modal-dialog input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(233, 68, 96, 0.1);
        }
        .modal-dialog .btn-join {
            margin-top: 18px;
            width: 100%;
            padding: 14px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: var(--transition);
            box-shadow: 0 4px 18px rgba(233, 68, 96, 0.3);
        }
        .modal-dialog .btn-join:hover {
            background: #ff5a75;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(233, 68, 96, 0.45);
        }
        .modal-dialog .btn-join:active {
            transform: scale(0.96);
            transition: 0.08s ease;
        }
        .modal-dialog .error-text {
            color: #ff6b6b;
            font-size: 0.8rem;
            margin-top: 8px;
            min-height: 20px;
            letter-spacing: 0.3px;
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .app-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                margin: 0;
                border: none;
            }
            .chat-header {
                padding: 12px 14px;
            }
            .chat-header h1 {
                font-size: 1rem;
            }
            .stats-badge {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            .messages-area {
                padding: 10px;
                gap: 4px;
            }
            .message-bubble {
                max-width: 85%;
                font-size: 0.85rem;
                padding: 8px 11px;
            }
            .input-area {
                padding: 8px 10px;
                gap: 6px;
            }
            .input-area input {
                padding: 10px 14px;
                font-size: 0.88rem;
            }
            .btn-send {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Фоновые частицы -->
    <div class="bg-particles" id="particles"></div>

    <!-- Модальное окно входа -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-dialog">
            <h2>💬 Добро пожаловать!</h2>
            <p class="modal-subtitle">Придумайте никнейм, чтобы войти в чат</p>
            <input
            type="text"
            id="nicknameInput"
            placeholder="Ваш никнейм..."
            maxlength="24"
            autocomplete="off"
            autofocus
            >
            <div class="error-text" id="errorText"></div>
            <button class="btn-join" id="btnJoin">🚀 Войти в чат</button>
        </div>
    </div>

    <!-- Основной интерфейс чата -->
    <div class="app-container" id="appContainer" style="display:none;">
        <div class="chat-header">
            <div class="title-group">
                <div class="icon-circle">💬</div>
                <div>
                    <h1>Общий чат</h1>
                    <div class="subtitle" id="onlineStatus">Подключение...</div>
                </div>
            </div>
            <div class="stats-badge">
                📨 <span class="count" id="totalCount">0</span> сообщ.
            </div>
        </div>
        <div class="messages-area" id="messagesArea">
            <div class="message-wrapper system">
                <div class="message-bubble">Добро пожаловать в чат! Напишите первое сообщение ✨</div>
            </div>
        </div>
        <div class="input-area">
            <input
            type="text"
            id="messageInput"
            placeholder="Введите сообщение..."
            maxlength="500"
            autocomplete="off"
            >
            <button class="btn-send" id="btnSend" title="Отправить">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM элементы ============
            const modalOverlay = document.getElementById('modalOverlay');
            const nicknameInput = document.getElementById('nicknameInput');
            const errorText = document.getElementById('errorText');
            const btnJoin = document.getElementById('btnJoin');
            const appContainer = document.getElementById('appContainer');
            const messagesArea = document.getElementById('messagesArea');
            const messageInput = document.getElementById('messageInput');
            const btnSend = document.getElementById('btnSend');
            const totalCountEl = document.getElementById('totalCount');
            const onlineStatus = document.getElementById('onlineStatus');
            const particlesContainer = document.getElementById('particles');

            // ============ Состояние ============
            let nickname = '';
            let ws = null;
            let totalMessageCount = 0;
            let reconnectTimer = null;
            let reconnectAttempts = 0;
            const MAX_RECONNECT_DELAY = 10000;

            // ============ Фоновые частицы ============
            function createParticles() {
                const colors = ['#e94560', '#533483', '#4ecca3', '#f0a500', '#7b68ee', '#ff6b9d'];
                for (let i = 0; i < 35; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 5 + 2;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
                    particle.style.animationDelay = (Math.random() * 10) + 's';
                    particlesContainer.appendChild(particle);
                }
            }
            createParticles();

            // ============ Генерация цвета по никнейму ============
            function getColorForNickname(name) {
                let hash = 0;
                for (let i = 0; i < name.length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                    hash = hash & hash; // Convert to 32bit integer
                }
                const hue = Math.abs(hash) % 360;
                return 'hsl(' + hue + ', 60%, 58%)';
            }

            // ============ Форматирование времени ============
            function formatTime(timestamp) {
                const d = new Date(timestamp);
                const h = String(d.getHours()).padStart(2, '0');
                const m = String(d.getMinutes()).padStart(2, '0');
                return h + ':' + m;
            }

            // ============ Прокрутка вниз ============
            function scrollToBottom(smooth) {
                requestAnimationFrame(() => {
                    messagesArea.scrollTo({
                        top: messagesArea.scrollHeight,
                        behavior: smooth ? 'smooth' : 'instant'
                    });
                });
            }

            function isNearBottom() {
                const threshold = 120;
                return messagesArea.scrollHeight - messagesArea.scrollTop - messagesArea.clientHeight <
                    threshold;
            }

            // ============ Добавление сообщения в DOM ============
            function addMessageToDOM(msg) {
                const wasNearBottom = isNearBottom();
                const wrapper = document.createElement('div');
                wrapper.classList.add('message-wrapper');

                if (msg.type === 'system') {
                    wrapper.classList.add('system');
                    const bubble = document.createElement('div');
                    bubble.classList.add('message-bubble');
                    bubble.textContent = msg.text;
                    wrapper.appendChild(bubble);
                } else {
                    const isMine = msg.nickname === nickname;
                    wrapper.classList.add(isMine ? 'mine' : 'other');

                    const bubble = document.createElement('div');
                    bubble.classList.add('message-bubble');

                    if (!isMine && msg.nickname) {
                        const nickEl = document.createElement('div');
                        nickEl.classList.add('message-nickname');
                        nickEl.style.color = getColorForNickname(msg.nickname);
                        nickEl.textContent = msg.nickname;
                        bubble.appendChild(nickEl);
                    }

                    const textEl = document.createElement('div');
                    textEl.classList.add('message-text');
                    textEl.textContent = msg.text;
                    bubble.appendChild(textEl);

                    const timeEl = document.createElement('div');
                    timeEl.classList.add('message-time');
                    timeEl.textContent = formatTime(msg.timestamp);
                    bubble.appendChild(timeEl);

                    wrapper.appendChild(bubble);
                }

                messagesArea.appendChild(wrapper);

                if (wasNearBottom) {
                    scrollToBottom(true);
                }
            }

            // ============ Обновление счётчика ============
            function updateTotalCount(count) {
                totalMessageCount = count;
                totalCountEl.textContent = count;
                // Небольшая анимация
                totalCountEl.style.transform = 'scale(1.25)';
                setTimeout(() => { totalCountEl.style.transform = 'scale(1)'; }, 200);
            }

            // ============ WebSocket подключение ============
            function connectWebSocket() {
                if (ws && ws.readyState === WebSocket.OPEN) return;

                const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = protocol + '//' + location.host;
                // Если мы на GitHub Pages, то location.host — это страница Pages,
                // и нужно подключиться к своему серверу.
                // Для локальной разработки / деплоя на одном сервере — location.host работает.
                // Если сервер отдельно, раскомментируйте строку ниже и укажите адрес:
                // const wsUrl = 'wss://your-server.com';

                try {
                    ws = new WebSocket(wsUrl);
                } catch (e) {
                    onlineStatus.textContent = 'Ошибка подключения';
                    scheduleReconnect();
                    return;
                }

                ws.onopen = () => {
                    console.log('WebSocket подключён');
                    reconnectAttempts = 0;
                    onlineStatus.textContent = '🟢 Онлайн';
                    onlineStatus.style.color = 'var(--success)';
                    // Отправляем информацию о присоединении
                    ws.send(JSON.stringify({ type: 'join', nickname: nickname }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleServerMessage(data);
                    } catch (e) {
                        console.error('Ошибка парсинга сообщения:', e);
                    }
                };

                ws.onclose = (event) => {
                    console.log('WebSocket закрыт, код:', event.code);
                    onlineStatus.textContent = '🔴 Переподключение...';
                    onlineStatus.style.color = 'var(--warning)';
                    ws = null;
                    scheduleReconnect();
                };

                ws.onerror = (err) => {
                    console.error('WebSocket ошибка:', err);
                    onlineStatus.textContent = '⚠️ Ошибка связи';
                    onlineStatus.style.color = '#ff6b6b';
                };
            }

            function scheduleReconnect() {
                if (reconnectTimer) return;
                const delay = Math.min(1000 * Math.pow(1.8, reconnectAttempts), MAX_RECONNECT_DELAY);
                reconnectAttempts++;
                onlineStatus.textContent = '🟡 Переподключение через ' + Math.round(delay / 1000) + 'с...';
                onlineStatus.style.color = 'var(--warning)';
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        connectWebSocket();
                    }
                }, delay);
            }

            function handleServerMessage(data) {
                switch (data.type) {
                    case 'history':
                        // Загружаем историю сообщений
                        messagesArea.innerHTML = '';
                        if (data.messages && data.messages.length > 0) {
                            data.messages.forEach(msg => addMessageToDOM(msg));
                        } else {
                            const wrapper = document.createElement('div');
                            wrapper.classList.add('message-wrapper', 'system');
                            const bubble = document.createElement('div');
                            bubble.classList.add('message-bubble');
                            bubble.textContent = '💬 Пока сообщений нет. Будьте первым!';
                            wrapper.appendChild(bubble);
                            messagesArea.appendChild(wrapper);
                        }
                        updateTotalCount(data.totalCount || 0);
                        scrollToBottom(false);
                        break;

                    case 'message':
                        addMessageToDOM(data.message);
                        updateTotalCount(data.totalCount);
                        break;

                    case 'system':
                        addMessageToDOM({ type: 'system', text: data.text, timestamp: Date.now() });
                        if (data.totalCount !== undefined) {
                            updateTotalCount(data.totalCount);
                        }
                        break;

                    case 'users':
                        const count = data.users ? data.users.length : 0;
                        onlineStatus.textContent = '🟢 Онлайн · ' + count + ' участник' +
                            getPlural(count);
                        onlineStatus.style.color = 'var(--success)';
                        break;

                    case 'error':
                        console.warn('Серверная ошибка:', data.text);
                        if (data.text && data.text.includes('никнейм')) {
                            // Показываем модалку заново
                            showModal('Этот никнейм уже занят. Выберите другой.');
                        }
                        break;

                    default:
                        console.log('Неизвестный тип сообщения:', data.type);
                }
            }

            function getPlural(n) {
                if (n % 10 === 1 && n % 100 !== 11) return 'а';
                if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return 'ов';
                return 'ов';
            }

            // ============ Отправка сообщения ============
            function sendMessage() {
                const text = messageInput.value.trim();
                if (!text) return;
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    onlineStatus.textContent = '⚠️ Нет соединения. Переподключение...';
                    onlineStatus.style.color = '#ff6b6b';
                    connectWebSocket();
                    return;
                }
                ws.send(JSON.stringify({ type: 'message', text: text }));
                messageInput.value = '';
                messageInput.focus();
            }

            // ============ Модальное окно ============
            function showModal(errorMsg) {
                modalOverlay.style.display = 'flex';
                appContainer.style.display = 'none';
                errorText.textContent = errorMsg || '';
                nicknameInput.value = nickname || '';
                setTimeout(() => nicknameInput.focus(), 150);
            }

            function hideModal() {
                modalOverlay.style.display = 'none';
                appContainer.style.display = 'flex';
                messageInput.focus();
            }

            // ============ Обработчики событий ============
            btnJoin.addEventListener('click', () => {
                const rawName = nicknameInput.value.trim();
                if (!rawName) {
                    errorText.textContent = 'Пожалуйста, введите никнейм';
                    nicknameInput.focus();
                    return;
                }
                if (rawName.length < 2) {
                    errorText.textContent = 'Никнейм должен содержать минимум 2 символа';
                    nicknameInput.focus();
                    return;
                }
                if (rawName.length > 24) {
                    errorText.textContent = 'Никнейм слишком длинный (макс. 24 символа)';
                    nicknameInput.focus();
                    return;
                }
                // Проверка на запрещённые символы
                if (!/^[a-zA-Zа-яА-ЯёЁ0-9_\-\s]+$/.test(rawName)) {
                    errorText.textContent = 'Только буквы, цифры, пробелы, _ и -';
                    nicknameInput.focus();
                    return;
                }
                nickname = rawName;
                errorText.textContent = '';
                hideModal();
                connectWebSocket();
            });

            nicknameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    btnJoin.click();
                }
            });

            btnSend.addEventListener('click', sendMessage);

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // ============ Закрытие соединения при уходе со страницы ============
            window.addEventListener('beforeunload', () => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'leave' }));
                    ws.close(1000, 'Ухожу');
                }
            });

            // ============ Восстановление фокуса на инпуте ============
            document.addEventListener('click', (e) => {
                if (appContainer.style.display !== 'none' &&
                    !e.target.closest('input') &&
                    !e.target.closest('button') &&
                    !e.target.closest('.modal-overlay')) {
                    messageInput.focus();
                }
            });

            // ============ Инициализация ============
            nicknameInput.focus();
            modalOverlay.style.display = 'flex';
            appContainer.style.display = 'none';

            console.log('💬 Чат-клиент инициализирован.');
            console.log('Подключение к WebSocket: ' +
                (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host);
        })();
    </script>
</body>
</html>
